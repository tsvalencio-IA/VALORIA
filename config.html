<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Configurar valor_IA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#f4f7fb;margin:0;color:#172033}main{max-width:980px;margin:auto;padding:18px}.card{background:white;border:1px solid #d9e2ef;border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 10px 28px #0001}label{display:block;font-weight:800;margin:10px 0 5px}input,textarea{width:100%;border:1px solid #d9e2ef;border-radius:12px;padding:10px}textarea{min-height:150px}button{border:0;border-radius:12px;background:#2563eb;color:white;font-weight:900;padding:12px;margin:4px}.green{background:#15803d}.light{background:#eef4fb;color:#243349;border:1px solid #d9e2ef}pre{white-space:pre-wrap;background:#0f172a;color:white;border-radius:12px;padding:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}.muted{color:#64748b}
</style>
</head>
<body>
<main>
<h1>Configurar cliente valor_IA</h1>
<div class="card">
<p class="muted">Cole o bloco Firebase ou preencha manualmente. Depois baixe os arquivos de configuração.</p>
<label>Firebase config completo</label><textarea id="cfg"></textarea>
<button class="light" onclick="fillFromBlock()">Ler bloco Firebase</button>
<div class="grid">
<div><label>apiKey</label><input id="apiKey"></div>
<div><label>authDomain</label><input id="authDomain"></div>
<div><label>databaseURL / Realtime Database</label><input id="databaseURL"></div>
<div><label>projectId</label><input id="projectId"></div>
<div><label>storageBucket</label><input id="storageBucket"></div>
<div><label>messagingSenderId</label><input id="messagingSenderId"></div>
<div><label>appId</label><input id="appId"></div>
<div><label>Link GitHub Pages</label><input id="url"></div>
<div><label>Email admin Firebase Auth</label><input id="email"></div>
<div><label>Nome estabelecimento</label><input id="nome"></div>
<div><label>WhatsApp gestor</label><input id="gestor"></div>
</div>
<button class="green" onclick="gen()">Gerar arquivos</button>
</div>
<div class="card">
<button onclick="down('firebase-config.js', firebaseText)">Baixar firebase-config.js</button>
<button onclick="down('robo-config.json', roboText)">Baixar robo-config.json</button>
<button onclick="down('DADOS_DO_CLIENTE.txt', notes)">Baixar DADOS_DO_CLIENTE.txt</button>
<pre id="out"></pre>
</div>
<p class="muted">Powered by thIAguinho Soluções Digitais</p>
</main>
<script>
let firebaseText='',roboText='',notes='';
function parse(t){
  t=t.trim().replace(/^const\s+firebaseConfig\s*=\s*/,'').replace(/^let\s+firebaseConfig\s*=\s*/,'').replace(/^var\s+firebaseConfig\s*=\s*/,'').replace(/;\s*$/,'');
  return Function('return ('+t+')')();
}
function fillFromBlock(){
  const c=parse(document.getElementById('cfg').value);
  apiKey.value=c.apiKey||'';authDomain.value=c.authDomain||'';databaseURL.value=c.databaseURL||'';projectId.value=c.projectId||'';storageBucket.value=c.storageBucket||'';messagingSenderId.value=c.messagingSenderId||'';appId.value=c.appId||'';
}
function gen(){
  const c={apiKey:apiKey.value,authDomain:authDomain.value,databaseURL:databaseURL.value,projectId:projectId.value,storageBucket:storageBucket.value,messagingSenderId:messagingSenderId.value,appId:appId.value};
  firebaseText=`const firebaseConfig = ${JSON.stringify(c,null,2)};\n\nif (typeof window !== "undefined") window.firebaseConfig = firebaseConfig;\nif (typeof module !== "undefined") module.exports = firebaseConfig;\n`;
  roboText=JSON.stringify({siteUrl:url.value,adminEmail:email.value,businessName:nome.value,managerPhone:gestor.value,signature:'Powered by thIAguinho Soluções Digitais'},null,2);
  notes=`valor_IA\nCliente: ${nome.value}\nURL: ${url.value}\nAdmin: ${email.value}\nGestor: ${gestor.value}\nFirebase: ${c.projectId}\nRealtime Database: ${c.databaseURL}\nPowered by thIAguinho Soluções Digitais`;
  out.textContent=firebaseText+'\\n'+roboText+'\\n\\n'+notes;
}
function down(n,t){if(!t)return alert('Gere os arquivos primeiro.');let b=new Blob([t],{type:'text/plain'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
</script>
</body>
</html>
