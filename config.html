<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Configurar valor_IA</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{font-family:Arial;background:#f4f7fb;margin:0;color:#172033}main{max-width:900px;margin:auto;padding:18px}.card{background:white;border:1px solid #d9e2ef;border-radius:18px;padding:18px;margin:14px 0}label{display:block;font-weight:800;margin:10px 0 5px}input,textarea{width:100%;border:1px solid #d9e2ef;border-radius:12px;padding:10px}textarea{min-height:150px}button{border:0;border-radius:12px;background:#2563eb;color:white;font-weight:900;padding:12px;margin:4px}pre{white-space:pre-wrap;background:#0f172a;color:white;border-radius:12px;padding:12px}</style></head><body><main><h1>Configurar cliente valor_IA</h1><div class="card"><label>Firebase config</label><textarea id="cfg"></textarea><label>Link GitHub Pages</label><input id="url"><label>Email admin Firebase</label><input id="email"><label>Nome estabelecimento</label><input id="nome"><label>WhatsApp gestor</label><input id="gestor"><button onclick="gen()">Gerar arquivos</button></div><div class="card"><button onclick="down('firebase-config.js', firebaseText)">Baixar firebase-config.js</button><button onclick="down('robo-config.json', roboText)">Baixar robo-config.json</button><button onclick="down('DADOS_DO_CLIENTE.txt', notes)">Baixar dados</button><pre id="out"></pre></div><p>Powered by thIAguinho Soluções Digitais</p></main><script>let firebaseText='',roboText='',notes='';function parse(t){t=t.trim().replace(/^const\s+firebaseConfig\s*=\s*/,'').replace(/;\s*$/,'');return Function('return ('+t+')')()}function gen(){const c=parse(document.getElementById('cfg').value);firebaseText=`const firebaseConfig = ${JSON.stringify(c,null,2)};\n\nif (typeof window !== "undefined") window.firebaseConfig = firebaseConfig;\nif (typeof module !== "undefined") module.exports = firebaseConfig;\n`;roboText=JSON.stringify({siteUrl:url.value,adminEmail:email.value,businessName:nome.value,managerPhone:gestor.value,signature:'Powered by thIAguinho Soluções Digitais'},null,2);notes=`valor_IA\nCliente: ${nome.value}\nURL: ${url.value}\nAdmin: ${email.value}\nGestor: ${gestor.value}\nFirebase: ${c.projectId}\nPowered by thIAguinho Soluções Digitais`;out.textContent=firebaseText+'\\n'+roboText}function down(n,t){let b=new Blob([t],{type:'text/plain'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;a.click()}</script></body></html>
